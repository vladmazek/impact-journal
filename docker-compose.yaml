services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      APP_URL: ${APP_URL:-http://localhost:3000}
      DATABASE_URL: ${DATABASE_URL:-mysql://journal:journal_password@db:3306/journal}
      AUTH_COOKIE_SECRET: ${AUTH_COOKIE_SECRET:-local-dev-only-secret-change-before-production}
      MEDIA_ROOT: ${MEDIA_ROOT:-/data/journal/media}
      MAX_IMAGE_UPLOAD_MB: ${MAX_IMAGE_UPLOAD_MB:-15}
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - app_next:/app/.next
      - ${HOST_STORAGE_ROOT:-/Users/vlad/impact-journal-data}/media:/data/journal/media
    command: ["sh", "-lc", "./docker/app/entrypoint.sh"]

  db:
    image: mariadb:11.4
    ports:
      - "3306:3306"
    environment:
      MARIADB_DATABASE: journal
      MARIADB_USER: journal
      MARIADB_PASSWORD: journal_password
      MARIADB_ROOT_PASSWORD: root_password
    volumes:
      - ${HOST_STORAGE_ROOT:-/Users/vlad/impact-journal-data}/db:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -ujournal -pjournal_password --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

volumes:
  app_node_modules:
  app_next:
